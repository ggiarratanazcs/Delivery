<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
          maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA base -->
    <meta name="theme-color" content="#001d47">
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Delivery Hub">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <title>ZCS | Delivery Hub</title>

    <!-- ── Intercetta token cliente PRIMA di React ── -->
    <script>
      (function() {
        var token = new URLSearchParams(window.location.search).get('token');
        if (token) {
          // Blocca il caricamento dell'app React sostituendo il contenuto
          document.addEventListener('DOMContentLoaded', function() {
            var root = document.getElementById('root');
            if (root) {
              root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#94a3b8;">Caricamento vista cliente…</div>';
            }
          });
          // Carica il modulo cliente invece dell'app
          window.__CLIENTE_TOKEN__ = token;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Se c'è un token cliente, carica ClienteStandalone invece dell'app
      if (window.__CLIENTE_TOKEN__) {
        const { ClienteStandalone } = await import('/src/components/ClienteStandalone.jsx');
        const { createRoot } = await import('react-dom/client');
        const React = await import('react');
        const root = createRoot(document.getElementById('root'));
        root.render(React.default.createElement(ClienteStandalone, { token: window.__CLIENTE_TOKEN__ }));
      } else {
        // App normale
        await import('/src/index.js');
      }
    </script>

    <!-- Registrazione Service Worker -->
    <script>
      // Disregistra eventuali service worker che potrebbero servire pagine in cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrato:', reg.scope))
            .catch(err => console.error('SW errore:', err));
        });
      }
    </script>
  </body>
</html>
